<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일본어 한자 학습</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <!-- Added a comment to force a new commit -->
  <div class="container">
    <header>
      <h1>바이브 칸지</h1>
    </header>
    <nav id="level-selection">
      <button class="level-button active" data-level="n5">N5</button>
      <button class="level-button" data-level="n4">N4</button>
      <button class="level-button" data-level="n3">N3</button>
      <button class="level-button" data-level="n2">N2</button>
      <button class="level-button" data-level="n1">N1</button>
    </nav>
    <main id="vocabulary-display">
      <p class="placeholder">난이도를 선택하여 학습을 시작하세요.</p>
    </main>

    <div id="vocabulary-modal" class="modal">
      <button id="nav-prev" class="nav-arrow prev">&#10094;</button>
      
      <div class="modal-content">
        <span class="close-button">&times;</span>
        
        <div class="toggle-container">
          <button id="toggle-kanji" class="toggle-btn active-toggle">한자</button>
          <button id="toggle-reading" class="toggle-btn active-toggle">히라가나</button>
          <button id="toggle-meaning" class="toggle-btn active-toggle">뜻</button>
        </div>

        <div class="modal-kanji"></div>
        <div class="modal-detail">
          <div class="modal-reading"></div>
          <div class="modal-meaning"></div>
        </div>
      </div>
      
      <button id="nav-next" class="nav-arrow next">&#10095;</button>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
