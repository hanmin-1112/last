<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바이브 漢 - STUDIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-container">
    
    <div class="nav-row-minimal">
      <div class="nav-item active" onclick="switchScreen('screen-home')">Home</div>
      <div class="nav-item" onclick="switchScreen('screen-vocab')">Kanji</div>
      <div class="nav-item" onclick="switchScreen('screen-quiz-setup')">Exercises</div>
    </div>

    <section id="screen-home" class="screen active-screen">
      <div class="home-logo-container">
        <h1 class="main-title">바이브 漢</h1>
        <div class="sub-logo-text">CREATIVE KANJI STUDIO</div>
      </div>
      
      <div class="home-menu">
        <button class="menu-btn hover-effect" onclick="switchScreen('screen-vocab')">Study <small style="display:block; font-size:0.4em;">Kanji</small></button>
        <button class="menu-btn hover-effect" onclick="switchScreen('screen-quiz-setup')">Test <small style="display:block; font-size:0.4em;">Yourself</small></button>
      </div>
    </section>

    <section id="screen-vocab" class="screen">
      <header class="minimal-header">
        <button class="back-btn" onclick="switchScreen('screen-home')">← Home</button>
        <h2 class="header-title" style="color:var(--accent-blue); font-weight:900; text-transform:uppercase;">Kanji List</h2>
      </header>
      
      <nav id="level-selection" class="level-nav">
        <button class="level-button active" data-level="n5">N5</button>
        <button class="level-button" data-level="n4">N4</button>
        <button class="level-button" data-level="n3">N3</button>
        <button class="level-button active" style="background:#ff9500; border-color:#ff9500;" data-level="mada">MADA</button>
      </nav>

      <div class="search-container">
        <input type="text" id="word-search" placeholder="Search Kanji..." style="border: 2px solid var(--accent-blue); padding:15px; border-radius:30px; width:80%;">
      </div>
      
      <main id="vocabulary-display" class="vocab-grid"></main>
    </section>

    <div id="vocabulary-modal" class="modal">
      <div class="modal-card">
        <div id="modal-word-number" class="modal-number"></div>
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <button id="nav-prev" class="inner-arrow prev" onclick="navigateWord('prev')">&#10094;</button>
        <button id="nav-next" class="inner-arrow next" onclick="navigateWord('next')">&#10095;</button>

        <div id="modal-kanji" class="kanji-huge"></div>
        
        <div class="detail-split">
          <div id="modal-reading" class="detail-box"></div>
          <div id="modal-meaning" class="detail-box"></div>
        </div>

        <div class="modal-status-btns" style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
           <button id="modal-mada-btn" class="level-button">MADA</button>
           <button id="modal-oboeru-btn" class="level-button active">LEARNED</button>
        </div>
      </div>
    </div>

  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
