<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바이브 漢</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-container">
    
    <section id="screen-home" class="screen active-screen glass-panel">
      <h1 class="main-title brush-font bold-brush">바이브 漢</h1>
      
      <p class="sub-title" style="color: var(--color-dark); font-weight: 600; font-size: 1.4em; margin-top: -10px; margin-bottom: 40px;">
        한자의 결을 느끼는 시간
      </p>
      
      <div class="home-menu">
        <button class="menu-btn hover-effect glass-effect brush-font bold-brush" onclick="switchScreen('screen-vocab')">단어 학습장</button>
        <button class="menu-btn hover-effect glass-effect brush-font bold-brush" onclick="switchScreen('screen-quiz-setup')">실전 퀴즈</button>
      </div>
    </section>

    <section id="screen-vocab" class="screen">
      <header class="screen-header">
        <button class="back-btn hover-effect" onclick="switchScreen('screen-home')">← 홈</button>
        <h2 class="brush-font bold-brush" style="font-size: 3em; margin:0;">단어 학습장</h2>
      </header>
      
      <nav id="level-selection">
        <button class="level-button active hover-effect" data-level="n5">N5</button>
        <button class="level-button hover-effect" data-level="n4">N4</button>
        <button class="level-button hover-effect" data-level="n3">N3</button>
        <button class="level-button hover-effect" data-level="n2">N2</button>
        <button class="level-button hover-effect" data-level="n1">N1</button>
        <button class="level-button mada-tab hover-effect" data-level="mada">まだまだ</button>
        <button class="level-button memo-tab hover-effect" data-level="oboeru">覚える</button>
      </nav>

      <div class="search-container">
        <input type="text" id="word-search" placeholder="단어 검색 (한자, 뜻, 히라가나)...">
      </div>
      
      <main id="vocabulary-display"></main>
    </section>

    <section id="screen-quiz-setup" class="screen glass-panel" style="max-width: 600px;">
      <header class="screen-header">
        <button class="back-btn hover-effect" onclick="switchScreen('screen-home')">← 홈</button>
        <h2 class="brush-font bold-brush" style="font-size: 2.5em; margin:0;">실전 퀴즈 설정</h2>
      </header>
      <div class="quiz-setup-group">
        <h3>1. 학습 레벨</h3>
        <div class="btn-group" id="setup-level">
          <button class="setup-btn active" data-val="n5">N5</button>
          <button class="setup-btn" data-val="n4">N4</button>
          <button class="setup-btn" data-val="n3">N3</button>
        </div>
      </div>
      <div class="quiz-setup-group">
        <h3>2. 문제 타입</h3>
        <div class="btn-group" id="setup-type">
          <button class="setup-btn active" data-val="meaning">뜻 맞추기</button>
          <button class="setup-btn" data-val="reading">음 맞추기</button>
          <button class="setup-btn" data-val="kanji">한자 맞추기</button>
          <button class="setup-btn" data-val="random">랜덤 출제</button>
        </div>
      </div>
      <div class="quiz-setup-group">
        <h3>3. 문항 수</h3>
        <div class="btn-group" id="setup-count">
          <button class="setup-btn" data-val="10">10</button>
          <button class="setup-btn active" data-val="20">20</button>
          <button class="setup-btn" data-val="30">30</button>
          <button class="setup-btn" data-val="40">40</button>
          <button class="setup-btn" data-val="50">50</button>
        </div>
      </div>
      
      <div style="display: flex; gap: 15px; margin-top: 30px;">
        <button class="menu-btn hover-effect glass-effect brush-font bold-brush" style="flex: 1; font-size: 2.2em; color: var(--accent-color);" onclick="startQuiz(null, 'multiple')">객관식</button>
        <button class="menu-btn hover-effect glass-effect brush-font bold-brush" style="flex: 1; font-size: 2.2em; color: #ff9500;" onclick="startQuiz(null, 'short')">서술형</button>
      </div>
    </section>

    <section id="screen-quiz-active" class="screen glass-panel" style="max-width: 600px;">
      <header class="quiz-header">
        <span id="quiz-progress">1 / 50</span>
        <button class="quit-btn hover-effect" onclick="switchScreen('screen-quiz-setup')">포기하기</button>
      </header>
      <div class="quiz-question-container">
        <p class="quiz-question-label" id="quiz-question-label">이 한자의 뜻은?</p>
        <div id="quiz-kanji" class="quiz-kanji">漢</div>
      </div>
      
      <div id="quiz-options" class="quiz-options"></div>
      
      <div id="quiz-short-answer-container" style="display:none; text-align:center;">
        <input type="text" id="short-answer-input" class="short-input" placeholder="정답을 입력하세요" autocomplete="off">
        <br>
        <button id="short-answer-submit" class="setup-btn active hover-effect" style="font-size:1.3em; padding:12px 40px; margin-top:10px;">제출</button>
      </div>
    </section>

    <section id="screen-quiz-result" class="screen glass-panel" style="max-width: 600px;">
      <h2 class="brush-font bold-brush" style="font-size: 3.5em;">테스트 완료! 🎉</h2>
      <div class="score-display"><span id="final-score">0</span> / <span id="total-score">50</span></div>
      
      <div style="display:flex; justify-content:center; gap:20px; margin-top:40px;">
        <button class="menu-btn hover-effect glass-effect brush-font bold-brush" onclick="switchScreen('screen-home')" style="font-size: 2em; padding: 15px 40px;">홈</button>
        <button id="btn-review-incorrect" class="menu-btn hover-effect glass-effect brush-font bold-brush" onclick="startIncorrectReview()" style="font-size: 2em; padding: 15px 40px; color: #ff3b30; display:none;">틀린 문제</button>
      </div>
    </section>

    <section id="screen-incorrect-review" class="screen glass-panel" style="max-width: 600px;">
       <header class="screen-header">
          <button class="back-btn hover-effect" onclick="switchScreen('screen-quiz-result')">← 뒤로</button>
          <h2 class="brush-font bold-brush" style="font-size: 2.5em; margin:0; color: #ff3b30;">오답 노트</h2>
       </header>
       <div id="review-progress" style="margin-bottom: 20px; font-weight: bold; color: var(--text-sub); font-size: 1.2em;">1 / 5</div>
       
       <div class="review-card glass-effect" style="padding: 40px; border-radius: 20px; text-align: center; margin-bottom: 25px;">
          <div id="rev-kanji" style="font-size: 5em; font-weight: 700; color: #1a1a1a;"></div>
          <div id="rev-reading" style="font-size: 1.5em; color: #666; margin-top: 10px;"></div>
          <div id="rev-meaning" style="font-size: 1.8em; font-weight: bold; color: #333; margin-top: 10px;"></div>
       </div>

       <label class="hover-effect" style="font-size: 1.5em; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; color: var(--accent-color);">
          <input type="checkbox" id="rev-checkbox" style="width: 25px; height: 25px; cursor: pointer;">
          확인 완료
       </label>

       <div style="display: flex; justify-content: space-between; margin-top: 30px;">
          <button id="rev-prev" class="setup-btn" style="flex:0.4;" onclick="navReview(-1)">이전</button>
          <button id="rev-next" class="setup-btn" style="flex:0.4;" onclick="navReview(1)">다음</button>
       </div>
    </section>

    <section id="screen-review-complete" class="screen glass-panel" style="max-width: 600px;">
      <h2 class="brush-font bold-brush" style="font-size: 3.5em; color: #34c759; margin-bottom: 5px;">모든 오답 확인 완료! ✨</h2>
      <p style="font-size: 1.2em; color: #666; margin-bottom: 40px;">수고하셨습니다. 이제 어떻게 할까요?</p>
      
      <div style="display: flex; flex-direction: column; gap: 20px;">
         <button class="menu-btn hover-effect glass-effect brush-font bold-brush" onclick="switchScreen('screen-home')" style="font-size: 2.5em; padding:20px;">홈으로 끝내기</button>
         <button class="menu-btn hover-effect glass-effect brush-font bold-brush" onclick="retakeIncorrectQuiz()" style="font-size: 2.5em; padding:20px; color: var(--accent-color);">틀린 단어로 다시 풀기</button>
      </div>
    </section>

    <div id="vocabulary-modal" class="modal">
      <button id="nav-prev" class="nav-arrow prev">&#10094;</button>
      <div class="modal-content solid-white">
        <span class="close-button">&times;</span>
        <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid #eee;">
           <button id="modal-mada-btn" class="setup-btn">まだまだ</button>
           <button id="modal-oboeru-btn" class="setup-btn">覚える</button>
        </div>
        <div class="toggle-container" style="margin-top: 0;">
          <button id="toggle-kanji" class="toggle-btn active-toggle hover-effect">한자</button>
          <button id="toggle-reading" class="toggle-btn active-toggle hover-effect">히라가나</button>
          <button id="toggle-meaning" class="toggle-btn active-toggle hover-effect">뜻</button>
        </div>
        <div class="modal-kanji"></div>
        <div class="modal-detail">
          <div class="modal-reading"></div>
          <div class="modal-meaning"></div>
        </div>
      </div>
      <button id="nav-next" class="nav-arrow next">&#10095;</button>
    </div>

  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
