<div class="quiz-setup-item" style="margin-bottom: 35px;">
    <label class="setup-label">출제 범위 (레벨/단어장)</label>
    
    <div id="setup-level" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
        <button class="level-button active" onclick="setQuizConfig('level', 'n5', this)">N5</button>
        <button class="level-button" onclick="setQuizConfig('level', 'n4', this)">N4</button>
        <button class="level-button" onclick="setQuizConfig('level', 'n3', this)">N3</button>
        <button class="level-button" onclick="setQuizConfig('level', 'n2', this)">N2</button>
        <button class="level-button" onclick="setQuizConfig('level', 'n1', this)">N1</button>
        
        <div style="flex-basis: 100%; height: 0; margin: 0;"></div>
        
        <button class="level-button oboeta-tab" onclick="setQuizConfig('level', 'oboeta', this)">覚えた</button>
        <button class="level-button oboenakatta-tab" onclick="setQuizConfig('level', 'oboenakatta', this)">覚えなかった</button>
    </div>
</div>
